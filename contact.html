<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 沈阳嘉桐科技有限公司</title>
    <meta name="description" content="联系嘉桐科技，了解更多课程信息">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <img src="logo.png" alt="嘉桐科技" class="nav-logo">
                <span class="brand-text">嘉桐科技</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="services.html">服务项目</a></li>
                <li><a href="classes.html">研学班级</a></li>
                <li><a href="wishwall.html">心愿墙</a></li>
                <li><a href="contact.html" class="active">联系我们</a></li>
            </ul>
            <div class="nav-actions">
                <button class="btn btn-primary btn-sm" onclick="showLoginModal()">登录</button>
                <button class="btn btn-secondary btn-sm" onclick="showRegisterModal()">注册</button>
            </div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- 页面头部 -->
    <header class="page-header">
        <div class="container">
            <h1>联系我们</h1>
            <p>有任何问题？请随时联系我们</p>
        </div>
    </header>

    <!-- 联系内容 -->
    <section class="section">
        <div class="container">
            <div class="contact-wrapper">
                <div class="contact-info">
                    <h2>联系我们</h2>
                    <p class="contact-desc">欢迎咨询课程信息，我们期待与您相遇</p>
                    
                    <div class="contact-item">
                        <div class="contact-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="contact-text">
                            <h4>邮箱</h4>
                            <p>69506408@qq.com</p>
                        </div>
                    </div>
                    
                    <div class="contact-item">
                        <div class="contact-icon">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div class="contact-text">
                            <h4>地址</h4>
                            <p>辽宁省沈阳市和平区</p>
                        </div>
                    </div>
                    
                    <div class="contact-item">
                        <div class="contact-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="contact-text">
                            <h4>营业时间</h4>
                            <p>周一至周五 9:00-18:00</p>
                        </div>
                    </div>
                    
                    <div style="margin-top: 30px;">
                        <h4>关注我们</h4>
                        <div class="social-links" style="margin-top: 15px;">
                            <a href="#"><i class="fab fa-weixin"></i></a>
                            <a href="#"><i class="fab fa-qq"></i></a>
                        </div>
                    </div>
                </div>

                <div class="contact-form">
                    <h3 style="margin-bottom: 20px; color: var(--primary);">在线留言</h3>
                    <form onsubmit="submitContact(event)">
                        <div class="form-group">
                            <label>姓名</label>
                            <input type="text" id="contactName" placeholder="请输入您的姓名" required>
                        </div>
                        <div class="form-group">
                            <label>电话</label>
                            <input type="tel" id="contactPhone" placeholder="请输入您的电话">
                        </div>
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" id="contactEmail" placeholder="请输入您的邮箱" required>
                        </div>
                        <div class="form-group">
                            <label>留言内容</label>
                            <textarea id="contactMessage" placeholder="请输入您的留言..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%">
                            <i class="fas fa-paper-plane"></i> 发送留言
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>嘉桐科技</h4>
                    <p>嘉心筑梦，桐启新章</p>
                    <p>专注于青少年科创教育</p>
                </div>
                <div class="footer-section">
                    <h4>联系方式</h4>
                    <p><i class="fas fa-envelope"></i> 69506408@qq.com</p>
                </div>
                <div class="footer-section">
                    <h4>关注我们</h4>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-weixin"></i></a>
                        <a href="#"><i class="fab fa-qq"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 沈阳嘉桐科技有限公司. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        function submitContact(e) {
            e.preventDefault();
            alert('留言已发送！我们会尽快回复您。');
            document.getElementById('contactName').value = '';
            document.getElementById('contactPhone').value = '';
            document.getElementById('contactEmail').value = '';
            document.getElementById('contactMessage').value = '';
        }
    </script>
</body>
</html>
